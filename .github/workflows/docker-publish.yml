name: Docker Build and Publish

on:
  push:
    branches:
      - main
  # Only main branch triggers builds
  # No feature branches, no PRs, no manual tag pushes

permissions:
  contents: write    # Create git tags and releases
  packages: write    # Push to GHCR
  issues: write      # Create GitHub releases
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for semantic-release

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

  semantic-version:
    name: Semantic Version
    needs: test
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
          branches: |
            [
              'main'
            ]

      - name: Output version info
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "New version published: v${{ steps.semantic.outputs.new_release_version }}"

  build-and-push:
    name: Build and Push Docker Image
    needs: semantic-version
    if: needs.semantic-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code at new version
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.semantic-version.outputs.new-release-version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}},value=${{ needs.semantic-version.outputs.new-release-version }}
            type=semver,pattern={{version}},value=${{ needs.semantic-version.outputs.new-release-version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.semantic-version.outputs.new-release-version }}
            type=semver,pattern={{major}},value=${{ needs.semantic-version.outputs.new-release-version }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=League Watcher Bot
            org.opencontainers.image.description=Discord bot for League of Legends match notifications
            org.opencontainers.image.version=${{ needs.semantic-version.outputs.new-release-version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"
